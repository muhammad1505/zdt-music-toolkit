name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Try matching the tag first (e.g., ## v4.3.0), then version-only
          BODY=$(awk -v tag="$TAG" -v ver="$VERSION" '
            BEGIN { capture=0; found=0 }
            /^## / {
              if (capture) { exit }
              if (index($0, tag) || index(tolower($0), "v" tolower(ver)) || index($0, "v" ver)) {
                capture=1; found=1; next
              }
            }
            capture { print }
          ' CHANGELOG.md)
          
          if [ -z "$BODY" ]; then
            BODY="Release $TAG"
          fi
          
          # Escape for GitHub Actions output
          BODY="${BODY//'%'/'%25'}"
          BODY="${BODY//$'\n'/'%0A'}"
          BODY="${BODY//$'\r'/'%0D'}"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---
            *Auto-generated release from CI pipeline.*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
