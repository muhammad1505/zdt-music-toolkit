name: ZDT CI

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ffmpeg shellcheck bash 2>/dev/null || true

    - name: Install Python test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flask

    - name: Bash syntax check with shellcheck
      run: |
        # ShellCheck on all shell scripts (non-fatal: info/warnings ignored, only errors matter)
        for f in *.sh zdt-modules/*.sh; do
          if [ -f "$f" ]; then
            shellcheck -S error -s bash "$f" 2>/dev/null || echo "⚠️  shellcheck issues in $f (non-fatal for CI)"
          fi
        done

    - name: Bash Smoke Test
      run: |
        bash test_smoke.sh

    - name: Python Pytest with Coverage
      run: |
        python -m pytest tests/ -v --cov=tests --cov=zdt-web.py --cov-report=term --cov-report=xml

    - name: Upload coverage to Codecov
      if: ${{ matrix.python-version == '3.12' }}
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
